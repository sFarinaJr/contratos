<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Contratos Profissional</title>
    
    <!-- Bibliotecas -->
    <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.1/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/imask"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #eef2f7; padding: 50px 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section-header { background: #243b55; color: white; padding: 12px 20px; border-radius: 8px; margin: 30px 0 15px 0; font-weight: bold; }
        .form-label { font-weight: 600; font-size: 0.9rem; color: #333; }
        .btn-submit { background: linear-gradient(to right, #243b55, #141e30); border: none; padding: 15px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-5">
        <h2 class="text-center mb-1" id="titulo_display">Carregando...</h2>
        <p class="text-center text-muted mb-4">Preencha todos os campos para gerar o contrato e anexar documentos.</p>
        
        <form id="contratoForm">
            <!-- SEÇÃO 1: LOCADORES (1 a 3) -->
            <div class="section-header">1. Dados dos Locadores</div>
            <div id="secao_locadores">
                <!-- Locador 1 -->
                <div class="row g-3 mb-4 border-bottom pb-3">
                    <div class="col-12"><h6>Locador 1 (Principal - Nome da Pasta no Drive)</h6></div>
                    <div class="col-md-6"><label class="form-label">Nome Completo</label><input type="text" class="form-control" id="locador1_nome" required></div>
                    <div class="col-md-3"><label class="form-label">CPF</label><input type="text" class="form-control mascara-cpf" id="locador1_cpf" required></div>
                    <div class="col-md-3"><label class="form-label">RG / CRO</label><input type="text" class="form-control" id="locador1_rg"></div>
                    <div class="col-md-9"><label class="form-label">Endereço Completo</label><input type="text" class="form-control" id="locador1_endereco"></div>
                    <div class="col-md-3"><label class="form-label">WhatsApp</label><input type="text" class="form-control mascara-tel" id="locador1_whatsapp"></div>
                    <div class="col-md-6"><label class="form-label">E-mail</label><input type="email" class="form-control" id="locador1_email"></div>
                </div>
                <!-- Locador 2 -->
                <div class="row g-3 mb-4 border-bottom pb-3">
                    <div class="col-12"><h6>Locador 2</h6></div>
                    <div class="col-md-6"><label class="form-label">Nome Completo</label><input type="text" class="form-control" id="locador2_nome"></div>
                    <div class="col-md-3"><label class="form-label">CPF</label><input type="text" class="form-control mascara-cpf" id="locador2_cpf"></div>
                    <div class="col-md-3"><label class="form-label">RG / CRO</label><input type="text" class="form-control" id="locador2_rg"></div>
                </div>
            </div>

            <!-- SEÇÃO 2: FIADORES (1 a 3) -->
            <div class="section-header">2. Dados dos Fiadores</div>
            <div id="secao_fiadores">
                <div class="row g-3 mb-4 border-bottom pb-3">
                    <div class="col-md-6"><label class="form-label">Nome Fiador 1</label><input type="text" class="form-control" id="fiador1_nome"></div>
                    <div class="col-md-3"><label class="form-label">CPF Fiador 1</label><input type="text" class="form-control mascara-cpf" id="fiador1_cpf"></div>
                    <div class="col-md-3"><label class="form-label">Identidade Fiador 1</label><input type="text" class="form-control" id="fiador1_rg"></div>
                    <div class="col-md-8"><label class="form-label">Endereço Fiador 1</label><input type="text" class="form-control" id="fiador1_endereco"></div>
                    <div class="col-md-4"><label class="form-label">WhatsApp Fiador 1</label><input type="text" class="form-control mascara-tel" id="fiador1_whatsapp"></div>
                </div>
            </div>

            <!-- SEÇÃO 3: CONDIÇÕES DO CONTRATO -->
            <div class="section-header">3. Condições da Locação</div>
            <div class="row g-3 mb-4">
                <div class="col-md-4"><label class="form-label">Prazo Mínimo (Meses)</label><input type="number" class="form-control" id="prazo_minimo" required></div>
                <div class="col-md-4"><label class="form-label">Valor do Aluguel</label><input type="text" class="form-control" id="valor_aluguel" required></div>
                <div class="col-md-4"><label class="form-label">Dia do Vencimento</label><input type="number" class="form-control" id="dia_vencimento" min="1" max="31" required></div>
                <div class="col-md-4"><label class="form-label">Data de Início</label><input type="date" class="form-control" id="data_inicio" required></div>
            </div>

            <!-- SEÇÃO 4: ANEXOS -->
            <div class="section-header">4. Anexar Documentos</div>
            <div class="mb-5">
                <label class="form-label">Selecione todos os documentos (RG, CPF, Comprovante de Residência)</label>
                <input type="file" class="form-control" id="arquivos_upload" multiple required>
            </div>

            <button type="button" onclick="iniciarProcesso()" class="btn btn-primary btn-submit w-100 shadow-lg text-white">
                GERAR CONTRATO E SALVAR NO DRIVE
            </button>
        </form>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO (Única parte que você altera entre os arquivos) ---
    const CONFIG = {
        TITULO: "Clínica Conceitualle", // Altere para "Face"
        ARQUIVO_DOCX: "clinica.docx",   // Altere para "face.docx"
        FOLDER_PAI: "14JX7X3n8vC-wbaFT8OZ5MKpxWIRN7rkg",
        CLIENT_ID: "688459189728-mio8aaig43ukqri3lpi2hk9eo5ka82oa.apps.googleusercontent.com"[cite: 2]
    };

    document.getElementById('titulo_display').innerText = "Gerador - " + CONFIG.TITULO;

    // --- MÁSCARAS ---
    document.querySelectorAll('.mascara-cpf').forEach(el => IMask(el, {mask: '000.000.000-00'}));
    document.querySelectorAll('.mascara-tel').forEach(el => IMask(el, {mask: '(00) 00000-0000'}));
    IMask(document.getElementById('valor_aluguel'), {
        mask: 'R$ num',
        blocks: { num: { mask: Number, thousandsSeparator: '.', radix: ',', padFractionalZeros: true, normalizeZeros: true } }
    });

    // --- LÓGICA GOOGLE DRIVE E DOCX ---
    let tokenClient;
    let accessToken = null;

    function initTokenClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CONFIG.CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.file',
            callback: (res) => { accessToken = res.access_token; processarFluxo(); }
        });
    }

    function iniciarProcesso() {
        if (!accessToken) tokenClient.requestAccessToken();
        else processarFluxo();
    }

    async function processarFluxo() {
        const nomePrincipal = document.getElementById('locador1_nome').value;
        if(!nomePrincipal) return alert("Preencha ao menos o nome do Locador 1.");

        try {
            // 1. Criar Pasta com o Nome do Locador 1
            const folder = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: nomePrincipal, mimeType: 'application/vnd.google-apps.folder', parents: [CONFIG.FOLDER_PAI] })
            }).then(r => r.json());

            // 2. Subir Anexos
            const inputFiles = document.getElementById('arquivos_upload').files;
            for (let f of inputFiles) {
                const meta = { name: f.name, parents: [folder.id] };
                const fd = new FormData();
                fd.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
                fd.append('file', f);
                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}` }, body: fd
                });
            }

            // 3. Gerar o Contrato Preenchido
            const resp = await fetch(CONFIG.ARQUIVO_DOCX);
            const content = await resp.arrayBuffer();
            const zip = new PizZip(content);
            const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            // MAPEAMENTO DE TODOS OS CAMPOS DO GOOGLE FORMS[cite: 1, 2]
            doc.render({
                locador1_nome: document.getElementById('locador1_nome').value,
                locador1_cpf: document.getElementById('locador1_cpf').value,
                locador1_rg: document.getElementById('locador1_rg').value,
                locador1_endereco: document.getElementById('locador1_endereco').value,
                locador1_whatsapp: document.getElementById('locador1_whatsapp').value,
                locador1_email: document.getElementById('locador1_email').value,
                
                locador2_nome: document.getElementById('locador2_nome').value,
                locador2_cpf: document.getElementById('locador2_cpf').value,
                locador2_rg: document.getElementById('locador2_rg').value,
                
                fiador1_nome: document.getElementById('fiador1_nome').value,
                fiador1_cpf: document.getElementById('fiador1_cpf').value,
                fiador1_rg: document.getElementById('fiador1_rg').value,
                fiador1_endereco: document.getElementById('fiador1_endereco').value,
                fiador1_whatsapp: document.getElementById('fiador1_whatsapp').value,
                
                valor_aluguel: document.getElementById('valor_aluguel').value,
                dia_vencimento: document.getElementById('dia_vencimento').value,
                prazo_minimo: document.getElementById('prazo_minimo').value,
                data_inicio: document.getElementById('data_inicio').value
            });

            const blob = doc.getZip().generate({ type: "blob" });
            const contratoFile = new File([blob], `Contrato_${nomePrincipal}.docx`);
            
            // 4. Subir Contrato Gerado na mesma pasta
            const metaC = { name: contratoFile.name, parents: [folder.id] };
            const fdC = new FormData();
            fdC.append('metadata', new Blob([JSON.stringify(metaC)], {type:'application/json'}));
            fdC.append('file', contratoFile);
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}` }, body: fdC
            });

            alert("Sucesso! Pasta criada e contrato salvo no Drive.");
        } catch (err) {
            console.error(err);
            alert("Ocorreu um erro. Verifique se o nome dos arquivos .docx no GitHub está correto.");
        }
    }
</script>
</body>
</html>
